<div class="section-heading">My Reviews</div>

@for (rev of myReviews; track rev.title) {
<div class="review-card">
    <div class="d-flex align-items-start justify-content-between">
        <div class="d-flex gap-3">
            <div class="book-cover-sm" [style.background]="rev.coverBg" style="flex-shrink:0">
                <i class="bi bi-book" style="color:var(--gold)"></i>
            </div>
            <div>
                <div style="font-weight:700;font-size:.92rem">{{ rev.title }}</div>
                <div style="font-size:.78rem;color:var(--brand-gray);margin-bottom:5px">{{ rev.author }}
                </div>
                <div class="stars">
                    @for (filled of getStarsArray(rev.stars); track $index) {
                    <i class="bi" [ngClass]="filled ? 'bi-star-fill' : 'bi-star'"></i>
                    }
                </div>
            </div>
        </div>
        <div style="font-size:.78rem;color:var(--brand-gray)">{{ rev.date }}</div>
    </div>
    <p style="font-size:.88rem;color:var(--brand-gray);margin:12px 0 0;line-height:1.6">{{ rev.text }}</p>
    <div class="d-flex gap-2 mt-3">
        <button class="track-btn" style="font-size:.78rem"><i class="bi bi-pencil"></i> Edit</button>
        <button class="track-btn" style="border-color:#dc3545;color:#dc3545;font-size:.78rem"><i
                class="bi bi-trash"></i> Delete</button>
    </div>
</div>
}
