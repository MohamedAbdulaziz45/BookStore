<div class="d-flex align-items-center justify-content-between mb-4">
    <div class="section-heading mb-0">Payment Methods</div>
    <button class="btn-gold-cust" style="padding:6px 14px;font-size:.8rem"><i class="bi bi-plus-lg me-1"></i>Add
        New</button>
</div>

@for (method of paymentMethods; track method.id) {
<div class="card-box d-flex align-items-center justify-content-between mb-3" style="padding:16px 20px">
    <div class="d-flex align-items-center gap-4">
        <div style="width:50px;height:35px;background:var(--brand-bg);border:1px solid var(--brand-border);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:1.2rem"
            [style.color]="method.color">
            <i class="bi" [ngClass]="method.icon"></i>
        </div>
        <div>
            <div style="font-weight:600;font-size:.9rem;display:flex;align-items:center;gap:10px">
                {{ method.type }} {{ method.last4 ? 'ending in ' + method.last4 : '' }}
                @if (method.isDefault) {
                <span
                    style="font-size:.65rem;background:rgba(225,169,43,.15);color:var(--gold);padding:2px 6px;border-radius:12px">DEFAULT</span>
                }
            </div>
            <div style="font-size:.78rem;color:var(--brand-gray);margin-top:2px">{{ method.holder }} {{
                method.expiry ? '· Expires ' + method.expiry : '' }}</div>
        </div>
    </div>
    <div class="d-flex gap-2">
        <button class="track-btn"><i class="bi bi-pencil"></i></button>
        <button class="track-btn" style="border-color:#dc3545;color:#dc3545"><i class="bi bi-trash"></i></button>
    </div>
</div>
}
