<nav class="navbar navbar-expand-lg main-navbar sticky-top">
  <div class="container">
    <!-- Brand -->
    <a class="navbar-brand d-flex align-items-center gap-2" routerLink="/">
      <div
        class="d-flex align-items-center justify-content-center rounded-2 bg-gold"
        style="width: 38px; height: 38px; flex-shrink: 0"
      >
        <span style="font-size: 1.1rem">📚</span>
      </div>
      <span
        class="fw-bold fs-4"
        style="
          color: var(--brand-dark);
          font-family: &quot;Lato&quot;, sans-serif;
        "
      >
        Book<span class="text-gold">Worms</span>
      </span>
    </a>

    <!-- Mobile toggle -->
    <button
      class="navbar-toggler border-0 p-1"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#mainNav"
      aria-label="Toggle navigation"
    >
      <i
        class="bi bi-list"
        style="font-size: 1.6rem; color: var(--brand-dark)"
      ></i>
    </button>

    <!-- Collapse -->
    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav mx-auto gap-lg-1 py-3 py-lg-0">
        @for (item of navItems; track item.label) {
          <li class="nav-item">
            <a
              class="nav-link"
              [routerLink]="item.path"
              routerLinkActive="active"
            >
              {{ item.label }}
            </a>
          </li>
        }
      </ul>

      <!-- Action icons -->
      <div class="d-flex align-items-center gap-1 mt-2 mt-lg-0">
        <form class="d-flex me-2 position-relative" (ngSubmit)="onSearch()">
          <input
            type="text"
            class="form-control form-control-sm rounded-pill px-3 py-1"
            placeholder="Search books..."
            [(ngModel)]="searchQuery"
            name="search"
            style="border-color: #c78b51; min-width: 160px; font-size: 0.85rem"
          />
          <button
            type="submit"
            class="btn btn-sm position-absolute end-0 top-50 translate-middle-y"
            style="color: #c78b51; border: none; background: transparent"
          >
            <i class="bi bi-search"></i>
          </button>
        </form>
        <button
          class="icon-btn"
          (click)="cartService.toggleCart()"
          aria-label="Cart"
        >
          <i class="bi bi-bag"></i>
          @if (cartService.totalItems() > 0) {
            <span class="cart-pill">{{ cartService.totalItems() }}</span>
          }
        </button>

        @if (!userService.isLoggedIn()) {
          <button
            type="button"
            class="icon-btn"
            aria-label="Account"
            data-bs-toggle="modal"
            data-bs-target="#authModal"
            (click)="openAuthModal('login')"
          >
            <i class="bi bi-person"></i>
          </button>
        } @else {
          <!-- Logged in: Show Dropdown -->
          <div class="dropdown d-inline-block">
            <button
              class="icon-btn dropdown-toggle"
              type="button"
              data-bs-toggle="dropdown"
              aria-expanded="false"
              style="border: none; background: transparent"
            >
              <i class="bi bi-person-check fs-5"></i>
            </button>

            <ul
              class="dropdown-menu dropdown-menu-end mt-2 shadow border-0"
              style="min-width: 200px"
            >
              <!-- Role-based link -->
              @if (userService.userRole() === "Admin") {
                <li>
                  <a class="dropdown-item py-2" routerLink="/admin-dashboard">
                    <i class="bi bi-speedometer2 me-2 text-gold"></i>Admin
                    Dashboard
                  </a>
                </li>
              } @else {
                <li>
                  <a class="dropdown-item py-2" routerLink="/my-account">
                    <i class="bi bi-house-door me-2 text-gold"></i>My Account
                  </a>
                </li>
              }
              <!-- Always show Profile link for logged-in users -->
              <li>
                <a class="dropdown-item py-2" routerLink="/profile">
                  <i class="bi bi-person-circle me-2 text-gold"></i>Profile
                </a>
              </li>
              <li><hr class="dropdown-divider" /></li>
              <li>
                <button
                  class="dropdown-item py-2"
                  (click)="showChangePasswordModal = true"
                >
                  <i class="bi bi-shield-lock me-2 text-gold"></i>Change
                  Password
                </button>
              </li>
              <!-- Logout button -->
              <li>
                <button
                  class="dropdown-item py-2 text-danger"
                  (click)="onLogout()"
                >
                  <i class="bi bi-box-arrow-right me-2"></i>Logout
                </button>
              </li>
            </ul>
          </div>
        }

        <a
          routerLink="/cart"
          class="btn btn-gold btn-sm ms-2 px-3 text-uppercase fw-bold"
          style="letter-spacing: 0.05em; font-size: 0.75rem"
        >
          <i class="bi bi-bag-check me-1"></i>Cart
        </a>
      </div>
    </div>
  </div>
</nav>

<app-auth-modal (loggedIn)="onLogin($event)"></app-auth-modal>
@if (showChangePasswordModal) {
  <app-change-password-modal
    (close)="showChangePasswordModal = false"
  ></app-change-password-modal>
}
