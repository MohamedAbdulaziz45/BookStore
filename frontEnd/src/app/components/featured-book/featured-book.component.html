<section class="section-py bg-brand">
  <div class="container">
    <div class="row align-items-center g-5">

      <!-- Image -->
      <div class="col-lg-5 order-lg-1 order-2">
        <div class="split-img">
          <img [src]="image" [alt]="title" loading="lazy" />
        </div>
      </div>

      <!-- Content -->
      <div class="col-lg-7 order-lg-2 order-1">
        <span class="section-label">World's Best Seller</span>
        @if (subtitle) {
          <p class="fst-italic text-brand-gray mb-2 small">{{ subtitle }}</p>
        }
        <h2 class="section-title mb-3" style="font-size:clamp(2.2rem,5vw,3.8rem)">{{ title }}</h2>
        <p class="fw-semibold text-brand-gray mb-3">{{ author }}</p>
        <p class="text-brand-gray lh-lg mb-4">{{ description }}</p>

        <div class="d-flex align-items-center gap-4 flex-wrap">
          @if (price) {
            <span class="fs-2 fw-bold text-gold">{{ price }}</span>
          }
          <button class="btn btn-gold btn-lg px-5 text-uppercase fw-bold">Buy Now</button>
        </div>

        <div class="mt-4" style="width:64px;height:4px;background:rgba(212,175,55,.3);border-radius:2px"></div>
      </div>

    </div>
  </div>
</section>
