<div class="admin-panel active d-block">
    <div class="dash-section-title mb-4">Settings</div>

    <div class="card-box mb-4">
        <div style="font-weight:700;margin-bottom:16px;font-size:.95rem"><i class="bi bi-shop me-2"></i>Store
            Information</div>
        <div class="row g-3">
            <div class="col-md-6">
                <div class="form-label-sm">Store Name</div>
                <input class="form-control-custom" type="text" value="BookWorms">
            </div>
            <div class="col-md-6">
                <div class="form-label-sm">Contact Email</div>
                <input class="form-control-custom" type="email" value="admin@bookworms.com">
            </div>
            <div class="col-md-6">
                <div class="form-label-sm">Phone</div>
                <input class="form-control-custom" type="tel" value="+1 800-BOOKS">
            </div>
            <div class="col-md-6">
                <div class="form-label-sm">Currency</div>
                <select class="form-control-custom">
                    <option>USD ($)</option>
                    <option>EUR (€)</option>
                    <option>GBP (£)</option>
                </select>
            </div>
        </div>
        <div class="d-flex gap-2 mt-4">
            <button class="btn-gold-cust">Save Changes</button>
            <button class="btn-outline-cust">Cancel</button>
        </div>
    </div>

    <div class="card-box mb-4">
        <div style="font-weight:700;margin-bottom:16px;font-size:.95rem"><i class="bi bi-truck me-2"></i>Shipping
            Settings</div>
        <div class="row g-3">
            <div class="col-md-6">
                <div class="form-label-sm">Default Carrier</div>
                <select class="form-control-custom">
                    <option>FedEx</option>
                    <option>UPS</option>
                    <option>USPS</option>
                    <option>DHL</option>
                </select>
            </div>
            <div class="col-md-6">
                <div class="form-label-sm">Free Shipping Threshold</div>
                <input class="form-control-custom" type="text" value="$35.00">
            </div>
            <div class="col-md-6">
                <div class="form-label-sm">Standard Shipping Rate</div>
                <input class="form-control-custom" type="text" value="$4.99">
            </div>
            <div class="col-md-6">
                <div class="form-label-sm">Express Shipping Rate</div>
                <input class="form-control-custom" type="text" value="$12.99">
            </div>
        </div>
        <div class="d-flex gap-2 mt-4">
            <button class="btn-gold-cust">Save Changes</button>
            <button class="btn-outline-cust">Cancel</button>
        </div>
    </div>
</div>
