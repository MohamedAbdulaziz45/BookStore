<div class="admin-panel active d-block">
    <div class="section-header mb-4">
        <div class="dash-section-title">Genres Management</div>
        <button class="btn-gold-dash"><i class="bi bi-plus-lg"></i> Add New Genre</button>
    </div>
    <div class="row g-3">
        @for (genre of genres; track genre.name) {
        <div class="col-md-3">
            <div class="stat-card" style="cursor:pointer">
                <div class="d-flex align-items-center gap-3 mb-3">
                    <div class="stat-icon-box" style="background:rgba(0,0,0,.04)">
                        <i class="bi" [ngClass]="genre.icon" [style.color]="genre.color"></i>
                    </div>
                    <div>
                        <div style="font-weight:700;font-size:.95rem">{{ genre.name }}</div>
                        <div style="font-size:.78rem;color:var(--brand-gray)">{{ genre.booksCount }} books</div>
                    </div>
                </div>
                <div class="d-flex gap-1">
                    <button class="action-btn edit"><i class="bi bi-pencil"></i></button>
                    <button class="action-btn del"><i class="bi bi-trash"></i></button>
                </div>
            </div>
        </div>
        }
    </div>
</div>
