<div
  #authModal
  class="modal fade"
  id="authModal"
  tabindex="-1"
  aria-labelledby="authModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog modal-dialog-centered">
    <div
      class="modal-content border-0 shadow"
      style="border-radius: 12px; overflow: hidden"
    >
      <div class="modal-header border-0 pb-0 justify-content-end p-3">
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>
      <div class="modal-body p-4 pt-1">
        <div class="text-center mb-4">
          <h4 class="fw-bold" style="font-family: &quot;Lato&quot;, sans-serif">
            {{ isLogin ? "Welcome Back" : "Create Account" }}
          </h4>
          <p class="text-muted small">
            {{
              isLogin
                ? "Login to access your cart and orders."
                : "Sign up to get started."
            }}
          </p>
        </div>

        <form [formGroup]="authForm" (ngSubmit)="onSubmit()" autocomplete="off">
          <div class="mb-3">
            <label class="form-label small fw-semibold text-muted"
              >Email Address</label
            >
            <input
              type="email"
              class="form-control"
              formControlName="email"
              placeholder="name@example.com"
            />
          </div>
          <div class="mb-3" *ngIf="!isLogin">
            <label class="form-label small fw-semibold text-muted"
              >Userame</label
            >
            <input
              type="text"
              class="form-control"
              formControlName="username"
              placeholder="AXZY"
            />
          </div>

          <div class="mb-4">
            <label class="form-label small fw-semibold text-muted"
              >Password</label
            >
            <input
              type="password"
              class="form-control"
              formControlName="password"
              placeholder="********"
            />
          </div>
          <div class="mb-4" *ngIf="!isLogin">
            <label class="form-label small fw-semibold text-muted"
              >Confirm Password</label
            >
            <input
              type="password"
              class="form-control"
              formControlName="confirmPassword"
              placeholder="********"
              autocomplete="new-password"
            />
            <div
              class="text-danger small mt-1"
              *ngIf="
                authForm.errors?.['passwordMismatch'] &&
                (authForm.get('confirmPassword')?.touched ||
                  authForm.get('confirmPassword')?.dirty)
              "
            >
              Passwords do not match.
            </div>
          </div>

          <button
            type="submit"
            class="btn btn-gold w-100 fw-bold py-2 mb-3"
            [disabled]="authForm.invalid"
          >
            {{ isLogin ? "Sign In" : "Sign Up" }}
          </button>
        </form>

        <div class="text-center">
          <p class="small text-muted mb-0">
            {{
              isLogin ? "Don't have an account?" : "Already have an account?"
            }}
            @if (isLogin) {
              <button
                type="button"
                class="btn btn-link p-0 text-decoration-none fw-semibold text-gold"
                (click)="setSignupMode($event)"
              >
                Sign up
              </button>
            } @else {
              <button
                type="button"
                class="btn btn-link p-0 text-decoration-none fw-semibold text-gold"
                (click)="setLoginMode($event)"
              >
                Log in
              </button>
            }
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
